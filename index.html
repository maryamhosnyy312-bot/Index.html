<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000000; /* خلفية سوداء صافية */
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translate(-50%, -60%);}
    to {opacity: 1; transform: translate(-50%, -50%);}
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: 220px;
    text-align: center;
    font-size: 16px;
}

button {
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    font-size: 16px;
    box-shadow: 0 0 15px red;
}

button:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translate(-50%, -50%) translateX(0); }
    25% { transform: translate(-50%, -50%) translateX(-5px); }
    50% { transform: translate(-50%, -50%) translateX(5px); }
    75% { transform: translate(-50%, -50%) translateX(-5px); }
    100% { transform: translate(-50%, -50%) translateX(0); }
}

  #slideshow {
    width: 300px; /* حجم الصورة */
    border-radius: 15px;
    transition: opacity 1s ease-in-out; /* تأثير fade سلس */
}
}

@keyframes floatImg {
    0% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
    100% {transform: translateY(0);}
}

.hearts {
    position: fixed;
    bottom: 0;
    width: 100%;
}

.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

#finalMessage {
    white-space: pre-line;
    font-size: 18px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 1️⃣ صفحة التاريخ -->
<div class="container" id="start">
    <h2>Do you remember this date? 💭</h2>
    <input type="text" id="dateInput" placeholder="Enter the special date">
    <br><br>
    <button onclick="checkDate()">Submit ❤️</button>
    <p id="error" style="color:#ff4d4d;"></p>
    <p id="hint" style="color:gray;"></p>
</div>

<!-- 2️⃣ المفاجأة -->
<div class="container hidden" id="surprise">
    <h1>Happy Birthday habebe ❤️</h1>

   <div class="gallery">
    <img id="slideshow" src="photo1.jpg">
</div>

    <p id="finalMessage"></p>

    <audio id="myAudio" loop>
        <source src="amrdiabhabebe.mp3" type="audio/mp3">
    </audio>
</div>

<div class="hearts" id="hearts"></div>

<script>
const correctDate ="1/1/2026"
let attempts = 0;

const messageText = "Happy birthday to First love , my favieee, \n my ride or die, my cupid , my person , my safeplace \n Life hit different the day you walked in. You didnt just make it better,you made it make sense. You love so hard, so real and I'll never stop being grateful for that. You've made my life a happier, safer, wilder Place.\n thank you for bring my spark back again and Take my hands to show me how the real, true love was.. we can fight ,get mad , and argue but at the end of day you're still my man and illooveeeuuu❤️"
let index = 0;

function typeMessage() {
    if (index < messageText.length) {
        document.getElementById("finalMessage").innerHTML += messageText.charAt(index);
        index++;
        setTimeout(typeMessage, 50);
    }
}
function checkDate() {
    let input = document.getElementById("dateInput").value;
    let box = document.getElementById("start");

    if (input === correctDate) {
        // اخفاء صفحة الباسورد
        document.getElementById("start").classList.add("hidden");
        document.getElementById("surprise").classList.remove("hidden");

        // تشغيل الأغنية
var audio = document.getElementById("myAudio");

document.body.addEventListener("click", function () {
    audio.play();
}, { once: true });

document.body.onclick = () => audio.play();

        // القلوب
        setInterval(createHeart, 300);

        // الرسالة الكبيرة
        setTimeout(typeMessage, 1000);

    } else {
        attempts++;
        box.classList.add("shake");
        setTimeout(() => box.classList.remove("shake"), 300);

        if (attempts === 1) {
            document.getElementById("error").innerText = "Wrong 😢";
            document.getElementById("hint").innerText = "Hint: Our special day 💕";
        } 
        else if (attempts === 2) {
            document.getElementById("error").innerText = "Still wrong 😭";
            document.getElementById("hint").innerText = "Hint: The day everything started ✨";
        } 
        else {
            document.getElementById("error").innerText = "Last chance 💔";
            document.getElementById("hint").innerText = "Think carefully...";
        }
    }
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
// Slideshow الصور
const images = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg" , "photo5.jpg" , "photo6.jpg"];
let currentIndex = 0;
const slideshow = document.getElementById("slideshow");

function nextImage() {
    slideshow.style.opacity = 0; // fade out
    setTimeout(() => {
        currentIndex = (currentIndex + 1) % images.length;
        slideshow.src = images[currentIndex];
        slideshow.style.opacity = 1; // fade in
    }, 500);
}

// بدء العرض بعد ظهور صفحة المفاجأة
setInterval(nextImage, 3000); // كل 3 ثواني صورة جديدة
</script>

</body>
</html>
